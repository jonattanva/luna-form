name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  bundle-size:
    name: bundle-size
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Build project
        run: pnpm build
      - name: Check bundle size
        run: |
          DIST="packages/luna-react/dist"
          LIMIT_KB=200
          total=0
          rows=""

          while IFS= read -r -d '' f; do
            size=$(wc -c < "$f")
            size_kb=$(awk "BEGIN {printf \"%.1f\", $size/1024}")
            rel="${f#$DIST/}"
            total=$((total + size))
            rows="${rows}| \`${rel}\` | ${size_kb} kB |
          "
          done < <(find "$DIST" -name "*.js" -print0 | sort -z)

          total_kb=$(awk "BEGIN {printf \"%.1f\", $total/1024}")
          limit_bytes=$((LIMIT_KB * 1024))

          {
            echo "<!-- bundle-size-report -->"
            echo "## Bundle size report (react-luna-form)"
            echo ""
            echo "| File | Size |"
            echo "|---|---|"
            echo "$rows"
            echo "**Total: ${total_kb} kB** (limit: ${LIMIT_KB} kB)"
          } > bundle-size-report.md

          cat bundle-size-report.md

          if [ "$total" -gt "$limit_bytes" ]; then
            echo "Bundle size ${total_kb} kB exceeds the limit of ${LIMIT_KB} kB" >&2
            exit 1
          fi
          echo "Bundle size ${total_kb} kB is within the ${LIMIT_KB} kB limit"
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('bundle-size-report.md', 'utf8')
            const marker = '<!-- bundle-size-report -->'

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.body.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

  build:
    name: build
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          cache: true
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Build project
        run: pnpm build
  lint:
    name: lint
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Lint project
        run: pnpm run lint
      - name: Run TypeScript checks
        run: pnpm run typescript
  unit-test:
    name: unit-test
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Run unit tests
        run: pnpm test:unit
  e2e-test:
    name: e2e-test
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Build project
        run: pnpm build
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm list @playwright/test --depth=0 --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Start application server
        run: pnpm serve &
      - name: Run e2e tests
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-e2e
          path: playwright-report/
          retention-days: 1
